name: Canyon Tracker

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run canyon tracker
        run: python Canyon.py
        env:
          CANYON_EMAIL: ${{ secrets.CANYON_EMAIL }}
          CANYON_PASSWORD: ${{ secrets.CANYON_PASSWORD }}
