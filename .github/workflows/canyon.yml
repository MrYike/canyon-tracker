name: Canyon Tracker

on:
  schedule:
    - cron: '0 * * * *'      # runs every hour
  workflow_dispatch:         # you can also run it manually

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run Canyon Tracker
        run: python Canyon.py
        env:
          CANYON_EMAIL: ${{ secrets.CANYON_EMAIL }}
          CANYON_PASSWORD: ${{ secrets.CANYON_PASSWORD }}

      - name: Prepare data for GitHub Pages
        run: |
          # Your script creates canyons_data.json → we rename it to exactly what the app expects
          cp canyons_data.json data.json

      - name: Commit and push data.json
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          git add data.json          # ← only this file matters for the app
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "update bookings - $(date '+%Y-%m-%d %H:%M')"
            git push origin main --force
          fi
